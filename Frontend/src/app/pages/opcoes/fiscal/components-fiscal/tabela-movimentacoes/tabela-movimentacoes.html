<div class="table-card">
  <div class="table-header">
    <h1>Últimas movimentações fiscais</h1>
    <a href="#" class="btn-ver-todas">Ver todas</a>
  </div>

  <div class="responsive-table">
    <table class="custom-table">
      <thead>
        <tr>
          <th>Documento</th>
          <th>Tipo</th>
          <th>Status</th>
          <th>Data</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of dados">
          <td class="id-column">{{ item.documento }}</td>
          <td>{{ item.tipo }}</td>
          <td>
            <span class="badge" [ngClass]="item.statusClass">
              {{ item.status }}
            </span>
          </td>
          <td>{{ item.data }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
