<div class="gasto-form-card">
  <div class="form-header">
    <h2>Novo Pedido de Compra de Produto</h2>
    <p>Selecione um parceiro comercial para carregar seu catálogo correspondente</p>
  </div>

  <form (ngSubmit)="salvarCompra()">
    
    <div class="form-group">
      <label for="fornecedor">Fornecedor</label>
      <div class="input-wrapper">
        <span class="input-icon">🏢</span>
        <select 
          id="fornecedor" 
          name="fornecedorId" 
          [(ngModel)]="fornecedorSelecionadoId" 
          (change)="aoAlterarFornecedor()" 
          required
        >
          <option [ngValue]="null" disabled selected>Escolha o fornecedor...</option>
          <option *ngFor="let forn of fornecedores" [ngValue]="forn.id">
            {{ forn.razaoSocial }} {{ forn.nomeFantasia ? '- ' + forn.nomeFantasia : '' }}
          </option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="produto">Produto do Catálogo</label>
      <div class="input-wrapper" [style.opacity]="!fornecedorSelecionadoId ? '0.6' : '1'">
        <span class="input-icon">📦</span>
        <select 
          id="produto" 
          name="produtoId"
          [(ngModel)]="compra.produtoId" 
          (change)="aoAlterarProduto()"
          [disabled]="!fornecedorSelecionadoId"
          required
        >
          <option [ngValue]="null" disabled selected>
            {{ !fornecedorSelecionadoId ? 'Aguardando seleção de fornecedor...' : 'Selecione o produto...' }}
          </option>
          <option *ngFor="let prod of produtos" [ngValue]="prod.id">
            {{ prod.descricao }} (Estoque atual: {{ prod.quantidadeEstoque ?? 0 }})
          </option>
        </select>
      </div>
      <small style="color: #6b7c96; margin-top: 4px; font-size: 0.7rem;" *ngIf="fornecedorSelecionadoId && produtos.length === 0">
        ⚠️ Nenhum produto cadastrado para este fornecedor.
      </small>
    </div>

    <div class="form-row">
      <div class="form-group size-half">
        <label for="quantidade">Quantidade Comprada</label>
        <div class="input-wrapper">
          <span class="input-icon" style="color: #00c3ff;">🔢</span>
          <input 
            type="number" 
            id="quantidade" 
            name="quantidadeComprada" 
            [(ngModel)]="compra.quantidadeComprada" 
            placeholder="Ex: 10" 
            min="1"
            required 
          />
        </div>
      </div>

      <div class="form-group size-half">
        <label for="precoCusto">Preço de Custo Unitário</label>
        <div class="input-wrapper">
          <span class="input-icon" style="color: #ff0055;">💰</span>
          <input 
            type="number" 
            id="precoCusto" 
            name="precoCustoUnitario" 
            [(ngModel)]="compra.precoCustoUnitario" 
            placeholder="0,00" 
            step="0.01" 
            required 
          />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="status">Status Inicial do Pedido</label>
      <div class="input-wrapper">
        <span class="input-icon">⚙️</span>
        <select 
          id="status" 
          name="status" 
          [(ngModel)]="compra.status" 
          required
        >
          <option value="Em Análise">Em Análise</option>
          <option value="Aprovado">Aprovado</option>
          <option value="Cancelado">Cancelado</option>
        </select>
      </div>
    </div>

    <div class="total-preview" *ngIf="compra.quantidadeComprada && compra.precoCustoUnitario">
      Previsão Total do Pedido: <span>{{ (compra.quantidadeComprada * compra.precoCustoUnitario) | currency:'BRL' }}</span>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="limparFormulario()">Limpar</button>
      <button type="submit" class="btn-submit" [disabled]="compra.produtoId === null">Registrar Compra ▲</button>
    </div>
  </form>
</div>
