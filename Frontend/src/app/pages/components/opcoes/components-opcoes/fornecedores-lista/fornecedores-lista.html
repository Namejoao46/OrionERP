<div class="container">
  <h1>Fornecedores Principais</h1>

  <div class="scroll-wrapper">
    <button class="arrow left" (click)="scrollLeft()">‹</button>

    <div class="scroll-horizontal" #scrollContainer>
      <div class="card-fornecedor" *ngFor="let f of fornecedores">
        <div class="avatar-wrapper">
          <div class="avatar">
            <img *ngIf="f.foto; else noPhoto" [src]="f.foto" alt="Avatar">
            <ng-template #noPhoto>
              <div class="sigla">{{ f.nome[0] }}</div>
            </ng-template>
          </div>
          <span class="status-indicator"></span>
        </div>
        <span class="fornecedor-nome">{{ f.nome }}</span>
      </div>
    </div>

    <button class="arrow right" (click)="scrollRight()">›</button>
  </div>
</div>
