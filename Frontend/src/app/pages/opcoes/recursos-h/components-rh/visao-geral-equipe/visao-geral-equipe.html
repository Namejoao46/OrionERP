<div class="table-card">
  <div class="table-header">
    <h1>Visão geral da equipe</h1>
  </div>

  <div class="responsive-table">
    <table class="custom-table">
      <thead>
        <tr>
          <th>Área</th>
          <th>Colaboradores</th>
          <th>Distribuição</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let setor of setores">
          <td class="id-column">
            <span class="status-dot" [style.background-color]="setor.cor"></span>
            {{ setor.nome }}
          </td>
          <td>{{ setor.qtd }}</td>
          <td>
            <div class="progress-container">
              <div class="progress-bar" [style.width]="setor.porcentagem" [style.background-color]="setor.cor"></div>
              <span class="progress-text">{{ setor.porcentagem }}</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
