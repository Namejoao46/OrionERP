<div class="resumo-box">
  <h3 class="box-title">Resumo de Vendas</h3>
  <div class="grid-resumo">
    <div class="resumo-item" *ngFor="let item of resumos">
      <div class="icon-placeholder">💰</div>
      <div class="info">
        <span class="valor">{{ item.valor | currency:'BRL':'symbol':'1.2-2':'pt-BR' }}</span>
        <span class="label">{{ item.label }}</span>
      </div>
    </div>
  </div>
</div>
