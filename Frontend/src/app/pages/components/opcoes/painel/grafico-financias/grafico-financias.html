<div class="conteiner">
  <div class="conteiner_grafico" *ngFor="let card of cards">
    <div class="conteudo-card">
      <h1>{{ card.valorTexto }}</h1>
      <h2>{{ card.titulo }}</h2>
    </div>
    
    <div class="container-canvas">
      <app-sparkline 
        [valorAtual]="card.valorNumerico" 
        [sucesso]="card.corSucesso"
        [maxPontosNaTela]="12">
      </app-sparkline>
    </div>
  </div>
</div>
