<div class="conteiner">
  <div class="conteiner_grafico" *ngFor="let card of cards">
    <div class="conteudo-card">
      <h1>{{ card.valorTexto }}</h1>
      <h2>{{ card.titulo }}</h2>
    </div>
    
    <div class="container-canvas">
      <apx-chart
        [series]="card.chartOptions.series"
        [chart]="card.chartOptions.chart"
        [colors]="card.chartOptions.colors"
        [stroke]="card.chartOptions.stroke"
        [fill]="card.chartOptions.fill"
        [tooltip]="card.chartOptions.tooltip"
        style="width: 100%; height: 60px; display: block;">
      </apx-chart>
    </div>
  </div>
</div>
