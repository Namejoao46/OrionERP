<div class="chart-status-card">
  <h1>Compras por Status</h1>
  
  <div class="chart-content">
    <div class="chart-graphic">
      <apx-chart
        [series]="chartOptions.series"
        [chart]="chartOptions.chart"
        [labels]="chartOptions.labels"
        [colors]="chartOptions.colors"
        [dataLabels]="chartOptions.dataLabels"
        [legend]="chartOptions.legend"
        [plotOptions]="chartOptions.plotOptions"
        [stroke]="chartOptions.stroke"
      ></apx-chart>
    </div>

    <div class="custom-legend">
      <div class="legend-item">
        <span class="bullet aprovado">✓</span>
        <span class="label">Aprovado</span>
        <span class="value">64 (45%)</span>
      </div>
      <div class="legend-item">
        <span class="bullet analise">🕒</span>
        <span class="label">Em Análise</span>
        <span class="value">24 (17%)</span>
      </div>
      <div class="legend-item">
        <span class="bullet recebido">📦</span>
        <span class="label">Recebido</span>
        <span class="value">43 (30%)</span>
      </div>
      <div class="legend-item">
        <span class="bullet cancelado">✕</span>
        <span class="label">Cancelado</span>
        <span class="value">11 (08%)</span>
      </div>
    </div>
  </div>
</div>
