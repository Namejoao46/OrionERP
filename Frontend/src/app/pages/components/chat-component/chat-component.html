<div class="chat-layout">
  <aside class="chat-sidenav">
    <div class="sidenav-header">Contatos</div>
    <ul class="contatos">
      <li *ngFor="let contato of contatos" 
          (click)="abrirConversa(contato)" 
          [class.active]="isMesmoUsuario(destinatario, contato)">
        <span class="icon">👤</span>
        <span class="nome">{{ contato }}</span>
      </li>
    </ul>
  </aside>

  <main class="chat-content">
    <header class="chat-header">
      <span class="titulo">Chat:</span>
      <span class="destinatario">{{ destinatario || 'Selecione um contato' }}</span>
    </header>

    <section class="chat-container">
      <div class="mensagens">
        <div *ngFor="let msg of mensagens"
             [ngClass]="{
               'mensagem remetente': isMesmoUsuario(msg.remetente, userName), 
               'mensagem destinatario': !isMesmoUsuario(msg.remetente, userName)
             }">
          <strong class="remetente-label">{{ msg.remetente }}</strong>
          <span class="texto-mensagem">{{ msg.texto || msg.conteudo }}</span>
        </div>
      </div>

      <footer class="nova-mensagem" *ngIf="destinatario">
        <input
          type="text"
          [(ngModel)]="novaMensagem"
          placeholder="Digite sua mensagem..."
          (keyup.enter)="enviar()"
          class="mensagem-input"
        />
        <button (click)="enviar()" class="btn-enviar">
          <span style="transform: rotate(-45deg); display: inline-block;">➤</span>
        </button>
      </footer>
    </section>
  </main>
</div>
