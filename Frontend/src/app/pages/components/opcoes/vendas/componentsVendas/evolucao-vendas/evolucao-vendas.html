<div class="grafico-box">
  <div class="grafico-header">
    <h3 class="box-title">Evolução das Vendas</h3>
    <div class="toggle-periodo">
      <button [class.active]="periodoSelecionado === 'diario'" (click)="alterarPeriodo('diario')">Diário</button>
      <button [class.active]="periodoSelecionado === 'semanal'" (click)="alterarPeriodo('semanal')">Semanal</button>
      <button [class.active]="periodoSelecionado === 'mensal'" (click)="alterarPeriodo('mensal')">Mensal</button>
    </div>
  </div>
  
  <div class="chart-container">
    <apx-chart
      [series]="chartOptions.series"
      [chart]="chartOptions.chart"
      [colors]="chartOptions.colors"
      [fill]="chartOptions.fill"
      [stroke]="chartOptions.stroke"
      [dataLabels]="chartOptions.dataLabels"
      [grid]="chartOptions.grid"
      [xaxis]="chartOptions.xaxis"
      [yaxis]="chartOptions.yaxis"
      [tooltip]="chartOptions.tooltip"
      style="width: 100%;">
    </apx-chart>
  </div>
</div>
