<nav class="conteiner">
    <div class="conteiner_menu">
        <app-menu></app-menu>
    </div>

    <div class="conteiner_logo">
        <div class="img">
            <img src="assets/orion.png" alt="Logo">
            <h1>
                <span class="orion">Orion</span><span class="erp">ERP</span>
            </h1>
        </div>
    </div>

    <div class="conteiner_pesquisa">
        <input type="search" placeholder="Busca...">
        <button class="busca-btn">
            <img src="assets/lupa.png" alt="lupa">
        </button>
    </div>

    <div class="conteiner_notificacoes">
        <li #notifRef (click)="abrirNotificacoes(notifRef)" class="icon-item">
            <div class="icon-wrapper">
                <img src="assets/sino.png" alt="notificações">
                <span class="badge-count" *ngIf="quantidadeNotificacoes > 0">{{ quantidadeNotificacoes }}</span>
            </div>
        </li>

        <li #msgRef (click)="abrirMensagens(msgRef)" class="icon-item">
            <div class="icon-wrapper">
                <img src="assets/bater-papo.png" alt="mensagens">
                <span class="badge-dot" *ngIf="temNovasMensagens"></span>
            </div>
        </li>
    </div>
    
    <div class="conteiner_perfil" #perfilRef (click)="abrirMenuPerfil(perfilRef)">
        <img [src]="(userImage$ | async) || 'assets/perfil.png'" alt="Imagem de perfil">
        <span class="perfil-nome">{{ (userName$ | async) || 'Usuário' }}</span>
    </div>
</nav>
