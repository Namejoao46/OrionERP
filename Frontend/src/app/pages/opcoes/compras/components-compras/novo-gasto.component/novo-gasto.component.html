<div class="gasto-form-card">
  <div class="form-header">
    <h2>Lançamento Manual de Gasto</h2>
    <p>Insira despesas operacionais diretas no fluxo de caixa</p>
  </div>

  <form (ngSubmit)="salvarGasto()">
    <div class="form-group">
      <label for="descricao">Descrição da Despesa</label>
      <div class="input-wrapper">
        <span class="input-icon">📝</span>
        <input 
          type="text" 
          id="descricao" 
          name="descricao" 
          [(ngModel)]="gasto.descricao" 
          placeholder="Ex: Conta de Energia Elétrica - Galpão" 
          required 
        />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group size-half">
        <label for="valor">Valor (R$)</label>
        <div class="input-wrapper">
          <span class="input-icon" style="color: #ff0055;">💰</span>
          <input 
            type="number" 
            id="valor" 
            name="valor" 
            [(ngModel)]="gasto.valor" 
            placeholder="0,00" 
            step="0.01" 
            required 
          />
        </div>
      </div>

      <div class="form-group size-half">
        <label for="categoria">Categoria</label>
        <div class="input-wrapper">
          <select id="categoria" name="categoria" [(ngModel)]="gasto.categoria">
            <option value="" disabled selected>Selecione...</option>
            <option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="metodo">Método de Pagamento</label>
      <div class="input-wrapper">
        <select id="metodo" name="metodo" [(ngModel)]="gasto.metodoPagamento">
          <option value="" disabled selected>Escolha a forma de saída...</option>
          <option *ngFor="let met of metodos" [value]="met">{{ met }}</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="limparFormulario()">Limpar</button>
      <button type="submit" class="btn-submit">Confirmar Saída ▲</button>
    </div>
  </form>
</div>
