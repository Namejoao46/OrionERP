<div class="cards-container">
  <div class="card" *ngFor="let card of cards">
    <div class="card-header">
      <div class="header-info">
        <h2 class="valor-principal">{{ card.valor }}</h2>
        <span class="sub-label">{{ card.titulo }}</span>
      </div>
      <span class="porcentagem-badge" [ngClass]="card.positivo ? 'positivo' : 'negativo'">
        {{ card.porcentagem }}
      </span>
    </div>
    <div class="card-footer">
      <span class="comparativo" [ngClass]="card.positivo ? 'txt-positivo' : 'txt-negativo'">
        {{ card.positivo ? '+' : '' }}{{ card.variacao }}
      </span>
      <span class="txt-comparativo">comparado a semana anterior</span>
    </div>
  </div>
</div>
