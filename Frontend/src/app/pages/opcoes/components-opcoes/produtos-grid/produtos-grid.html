<div class="lista-container">
  <div class="topo-tabela">
    <h1>Estoque Geral de Produtos</h1>
    <div class="busca-box">
      <span style="color: #00c3ff;">🔍</span>
      <input 
        type="text" 
        [(ngModel)]="termoBusca" 
        placeholder="Pesquisar por descrição ou código..."
      >
    </div>
  </div>

  <table class="tabela-estilizada">
    <thead>
      <tr>
        <th>Código</th>
        <th>Produto / Descrição</th>
        <th>Quantidade</th>
        <th>Preço Unit.</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of produtosFiltrados">
        <td style="color: #00c3ff; font-weight: bold;">#{{ p.id }}</td>
        
        <td class="coluna-descricao" style="font-weight: 500;" [attr.data-title]="p.descricao">
          {{ p.descricao }}
        </td>
        
        <td>{{ p.estoqueAtual ?? 0 }} un</td>
        
        <td>{{ (p.precoVenda ?? 0) | currency:'BRL' }}</td>
        
        <td>
          <span class="badge" [class.low]="(p.estoqueAtual ?? 0) <= 5">
            {{ (p.estoqueAtual ?? 0) <= 5 ? 'Baixo Estoque' : 'Em Dia' }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="produtosFiltrados.length === 0 && produtos.length > 0" style="color: gray; padding: 20px; text-align: center;">
    Nenhum produto encontrado para "{{ termoBusca }}"
  </div>
</div>
