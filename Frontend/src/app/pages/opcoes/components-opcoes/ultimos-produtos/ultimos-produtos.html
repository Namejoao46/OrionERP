<div class="sidebar-ultimos">
  <h1>Recentemente Adicionados</h1>
  
  <div class="item-recente" *ngFor="let item of ultimos" [attr.data-title]="item.descricao">
    <div class="status-dot"></div>
    
    <div class="info">
      <strong class="produto-titulo">{{ item.descricao }}</strong>
      <span>
        <i class="time-icon">🕒</i> {{ (item.data | date:'HH:mm') ?? '--:--' }} — 
        <b style="color: #00c3ff;">{{ item.estoqueAtual ?? 0 }} un</b>
      </span>
    </div>
  </div>
</div>
